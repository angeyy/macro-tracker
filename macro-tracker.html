<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Macro Tracker</title>
<style>
:root{--bg:#f5f5f7;--card:#fff;--text:#111;--muted:#6e6e73;--line:#e5e5ea;--fill:#111;--soft:#f0f0f3}
@media (prefers-color-scheme: dark){:root{--bg:#000;--card:#1c1c1e;--text:#f5f5f7;--muted:#a1a1a6;--line:#38383a;--fill:#fff;--soft:#2c2c2e}}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif}
.app{max-width:520px;margin:0 auto;padding:18px 14px 34px}
h1{font-size:30px;margin:8px 4px 16px}.card{background:var(--card);border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 1px 0 rgba(0,0,0,.04)}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}.big{font-size:30px;font-weight:800}.muted{color:var(--muted)}.label{font-weight:700}
.bar{height:12px;background:var(--soft);border-radius:999px;overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;background:var(--fill);border-radius:999px;width:0%}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.small{font-size:14px}
button,input{font:inherit}button{border:0;border-radius:16px;padding:13px 14px;font-weight:700;background:var(--text);color:var(--bg);width:100%}
.secondary{background:var(--soft);color:var(--text)}.danger{background:#ff3b30;color:white}
input{width:100%;padding:13px;border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--text);margin:6px 0 10px}
.meal{border-top:1px solid var(--line);padding:11px 0}.meal:first-child{border-top:0}.meal button{width:auto;padding:7px 10px;border-radius:10px;font-size:13px}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0 12px}.hidden{display:none}
</style>
</head>
<body>
<div class="app">
  <h1>Macro Tracker</h1>
  <div class="tabs">
    <button class="secondary" onclick="show('today')">Today</button>
    <button class="secondary" onclick="show('history')">History</button>
    <button class="secondary" onclick="show('settings')">Settings</button>
  </div>

  <section id="today">
    <div class="card">
      <div class="row"><div><div class="label">🔥 Calories</div><div class="muted small">Remaining: <span id="remaining">0</span></div></div><div class="big"><span id="cal">0</span>/<span id="calGoal">1500</span></div></div>
      <div class="bar"><span id="calBar"></span></div>
    </div>
    <div class="grid">
      <div class="card"><div class="label">💪 Protein</div><div class="big"><span id="p">0</span>/<span id="pGoal">90</span>g</div><div class="bar"><span id="pBar"></span></div></div>
      <div class="card"><div class="label">🍚 Carbs</div><div class="big"><span id="c">0</span>/<span id="cGoal">150</span>g</div><div class="bar"><span id="cBar"></span></div></div>
      <div class="card"><div class="label">🥑 Fat</div><div class="big"><span id="f">0</span>/<span id="fGoal">55</span>g</div><div class="bar"><span id="fBar"></span></div></div>
      <div class="card"><div class="label">🍽 Meals</div><div class="big" id="mealCount">0</div><div class="muted small">logged today</div></div>
    </div>

    <div class="card">
      <div class="label">➕ Add meal</div>
      <input id="name" placeholder="Meal name (optional)">
      <input id="kcal" type="number" inputmode="decimal" placeholder="Calories">
      <input id="protein" type="number" inputmode="decimal" placeholder="Protein (g)">
      <input id="carbs" type="number" inputmode="decimal" placeholder="Carbs (g)">
      <input id="fat" type="number" inputmode="decimal" placeholder="Fat (g)">
      <button onclick="addMeal()">Save meal</button>
      <button class="secondary" style="margin-top:8px" onclick="pasteLine()">Paste one-line macros</button>
      <div class="muted small" style="margin-top:8px">Example: 420 35 30 15 = kcal, protein, carbs, fat</div>
    </div>

    <div class="card">
      <div class="row"><div class="label">Today’s meals</div><button class="secondary" onclick="clearToday()">Clear today</button></div>
      <div id="meals"></div>
    </div>
  </section>

  <section id="history" class="hidden">
    <div class="card"><div class="label">📅 Daily history</div><div id="historyList"></div></div>
    <div class="card">
      <button class="secondary" onclick="exportData()">Export backup</button>
      <button class="secondary" style="margin-top:8px" onclick="importData()">Import backup</button>
    </div>
  </section>

  <section id="settings" class="hidden">
    <div class="card">
      <div class="label">🎯 Goals</div>
      <input id="gCal" type="number" placeholder="Calories goal">
      <input id="gP" type="number" placeholder="Protein goal">
      <input id="gC" type="number" placeholder="Carbs goal">
      <input id="gF" type="number" placeholder="Fat goal">
      <button onclick="saveGoals()">Save goals</button>
    </div>
  </section>
</div>

<script>
const todayKey=()=>new Date().toISOString().slice(0,10);
let data=JSON.parse(localStorage.getItem('macroData')||'{"goals":{"cal":1500,"p":90,"c":150,"f":55},"days":{}}');
function save(){localStorage.setItem('macroData',JSON.stringify(data));render()}
function day(){let k=todayKey(); if(!data.days[k]) data.days[k]=[]; return data.days[k]}
function num(id){return parseFloat(document.getElementById(id).value)||0}
function pct(v,g){return Math.min(100, g? (v/g*100):0)}
function sum(list){return list.reduce((a,m)=>({cal:a.cal+m.cal,p:a.p+m.p,c:a.c+m.c,f:a.f+m.f}),{cal:0,p:0,c:0,f:0})}
function show(id){['today','history','settings'].forEach(x=>document.getElementById(x).classList.toggle('hidden',x!==id));render()}
function addMeal(){let m={name:document.getElementById('name').value||'Meal',cal:num('kcal'),p:num('protein'),c:num('carbs'),f:num('fat'),time:new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}; day().push(m); ['name','kcal','protein','carbs','fat'].forEach(id=>document.getElementById(id).value=''); save()}
function pasteLine(){let s=prompt('Paste: calories protein carbs fat'); if(!s)return; let a=s.match(/-?\d+(\.\d+)?/g)||[]; if(a.length>=4){document.getElementById('kcal').value=a[0];document.getElementById('protein').value=a[1];document.getElementById('carbs').value=a[2];document.getElementById('fat').value=a[3]}}
function delMeal(i){day().splice(i,1);save()}
function clearToday(){if(confirm('Clear all meals for today?')){data.days[todayKey()]=[];save()}}
function saveGoals(){data.goals={cal:num('gCal')||1500,p:num('gP')||90,c:num('gC')||150,f:num('gF')||55};save()}
function exportData(){navigator.clipboard.writeText(JSON.stringify(data));alert('Backup copied to clipboard. Save it in Notes.')}
function importData(){let s=prompt('Paste backup JSON'); if(!s)return; try{data=JSON.parse(s);save()}catch(e){alert('Invalid backup')}}
function render(){
 let g=data.goals, t=sum(day());
 [['cal',t.cal,g.cal],['p',t.p,g.p],['c',t.c,g.c],['f',t.f,g.f]].forEach(x=>{document.getElementById(x[0]).textContent=Math.round(x[1]);document.getElementById(x[0]+'Goal').textContent=x[2];document.getElementById(x[0]+'Bar').style.width=pct(x[1],x[2])+'%'});
 document.getElementById('remaining').textContent=Math.max(0,Math.round(g.cal-t.cal)); document.getElementById('mealCount').textContent=day().length;
 ['gCal','gP','gC','gF'].forEach((id,i)=>document.getElementById(id).value=[g.cal,g.p,g.c,g.f][i]);
 document.getElementById('meals').innerHTML=day().map((m,i)=>`<div class="meal"><div class="row"><div><b>${m.name}</b><div class="muted small">${m.time} · ${Math.round(m.cal)} kcal · P ${m.p} C ${m.c} F ${m.f}</div></div><button class="danger" onclick="delMeal(${i})">Delete</button></div></div>`).join('') || '<div class="muted">No meals yet.</div>';
 document.getElementById('historyList').innerHTML=Object.keys(data.days).sort().reverse().map(k=>{let s=sum(data.days[k]);return `<div class="meal"><b>${k}</b><div class="muted small">${Math.round(s.cal)} kcal · P ${Math.round(s.p)} C ${Math.round(s.c)} F ${Math.round(s.f)} · ${data.days[k].length} meals</div></div>`}).join('');
}
render();
</script>
</body>
</html>
